# ── Data ──────────────────────────────────────────────
data:
  val_dir:    "data/DIV2K/valid_HR"   # 100 HR images, used for both train and val
  train_split: 0.8                    # 80 images train, 20 images val
  patch_size: 256                     # HR patch size fed to experts
  scale: 4                            # upscale factor (all experts output 4×)
  num_workers: 4

# ── Degradation ───────────────────────────────────────
degradation:
  noise_sigma_range: [5, 30]
  jpeg_quality_range: [40, 95]
  blur_kernel_range:  [3, 5]
  downscale: true
  max_degradations: 2

# ── Fusion Model ──────────────────────────────────────
fusion:
  in_channels: 9           # 3 experts × 3 channels each
  mid_channels: 64         # intermediate feature channels
  num_res_blocks: 4        # residual blocks in fusion net
  num_experts: 3           # Real-ESRGAN, EDSR, Bicubic

# ── Loss ──────────────────────────────────────────────
loss:
  l1_weight:  1.0
  fft_weight: 0.1

# ── Training ──────────────────────────────────────────
training:
  batch_size: 4            # small — experts are heavy at inference
  total_iters: 20000
  lr: 0.0002
  lr_min: 0.00001
  warmup_iters: 500
  save_every: 5000
  eval_every: 2000
  log_every: 50
  checkpoint_dir: "checkpoints"
  amp: true

# ── Evaluation ────────────────────────────────────────
eval:
  test_dir: "data/DIV2K/valid_HR"
